<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naval Storm | Enhanced Battle HUD</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        
        /* Lobby Overlay */
        #lobby {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #05101a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .btn {
            padding: 15px 40px; margin: 10px; cursor: pointer; border: 1px solid #555;
            background: #111; color: #eee; font-size: 1rem; transition: 0.2s;
        }
        .btn:hover { background: #eee; color: #000; }

        /* --- THE NEW ENHANCED UI --- */
        #game-hud { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: Arial, sans-serif; }

        /* 1. TOP BAR (Scores & Timer) */
        #top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #222; }
        .score-box { display: flex; align-items: center; gap: 10px; padding: 0 20px; font-weight: bold; font-size: 1.2rem; }
        #timer-box { font-size: 1.5rem; color: #0f0; background: rgba(0,10,20,0.9); padding: 5px 20px; border: 1px solid #0f0; border-radius: 5px; }
        .nation-flag { width: 30px; height: 20px; border: 1px solid #444; }

        /* 2. Chat / Kill Feed (Top Left) */
        #chat-feed { position: absolute; top: 60px; left: 20px; width: 300px; height: 150px; overflow: hidden; color: #aaa; font-size: 0.8rem; line-height: 1.2rem; }
        .chat-p1 { color: #f44; } /* Axis (USSR/GER) colors */
        .chat-p2 { color: #44f; } /* Allies (USA) colors */

        /* 3. Vertical Resource Stack (Left Side) */
        #resource-stack { position: absolute; top: 220px; left: 20px; display: flex; flex-direction: column; gap: 15px; }
        .res-icon-box { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1rem; text-shadow: 1px 1px 2px #000; }
        .icon { width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; color: #000; border-radius: 3px; font-size: 1.2rem; }
        .hp-icon { background: #f44; color: #fff; }
        .ammo-icon { background: #ff0; color: #000; font-size: 1rem; }
        .torp-icon { background: #333; color: #0f0; }
        .fuel-icon { background: #f80; color: #fff; }

        /* 4. Controls / Action Bar (Bottom Right) */
        #controls-stack { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .action-box { display: flex; align-items: center; gap: 10px; }
        .action-key { background: #222; color: #aaa; padding: 5px 10px; font-size: 0.8rem; border-radius: 3px; border: 1px solid #444; }

        /* Simple Crosshair */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid rgba(0,255,0,0.5); border-radius: 50%; transform: translate(-50%, -50%); display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3rem; letter-spacing: 15px; color: #aaa;">NAVAL STORM</h1>
    <div style="display: flex;">
        <button class="btn" onclick="startGame('USA', 0x2233ff)">USA FLEET</button>
        <button class="btn" onclick="startGame('USSR', 0xff2222)">USSR FLEET</button>
    </div>
</div>

<div id="game-hud">
    <div id="top-bar">
        <div class="score-box" style="color:#f44;">
            <div class="nation-flag" style="background:#555;"></div> 
            <span id="score-p1">25000 / 25000</span>
        </div>
        
        <div id="timer-box">95:22</div>
        
        <div class="score-box" style="color:#44f;">
            <span id="score-p2">25000 / 25000</span>
            <div class="nation-flag" style="background: linear-gradient(to right, #f22 50%, #fff 50%);"></div> 
        </div>
    </div>

    <div id="chat-feed">
        <div class="chat-p1">til the harbor captain</div>
        <div>{Team} happy get torpedo bomber</div>
        <div class="chat-p2">i have torpedo</div>
        <div>* [bhjagdad]: i won't kill</div>
    </div>

    <div id="resource-stack">
        <div class="res-icon-box"> <div class="icon hp-icon">❤️</div> <span id="hp-val">100</span> </div>
        <div class="res-icon-box"> <div class="icon ammo-icon">=]</div> <span id="ammo-val">300</span> </div>
        <div class="res-icon-box"> <div class="icon torp-icon">⏚</div> <span id="torp-val">1</span> </div>
        <div class="res-icon-box"> <div class="icon fuel-icon">⛽</div> <span id="fuel-val">93</span> </div>
    </div>

    <div id="controls-stack">
        <div class="action-box"> <div class="action-key">Vehicle</div> </div>
        <div class="action-box"> <div class="action-key" style="background:#f44; color:#fff;">Fly (E)</div> </div>
    </div>

</div>

<div id="crosshair"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { Water } from 'three/addons/objects/Water.js';

    let scene, camera, renderer, water, ship, myNation;
    let velocity = 0, health = 100, isLocked = false;
    let ammoCount = 300, fuelCount = 93;
    const keys = {}, bullets = [], otherPlayers = [];

    window.startGame = (nation, color) => {
        myNation = nation;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-hud').style.display = 'block';
        
        // Build Ship based on chosen nation specs
        const hullGeo = (nation === 'USSR') ? new THREE.BoxGeometry(7, 3, 14) : new THREE.BoxGeometry(4, 2.5, 18);
        const hull = new THREE.Mesh(hullGeo, new THREE.MeshStandardMaterial({ color: color, metalness: 0.9 }));
        hull.position.y = 1.5;
        ship.add(hull);
    };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
        ship = new THREE.Group();
        scene.add(ship);
        ship.add(camera);
        camera.position.set(0, 6, 0); // FPS POV from the bridge

        water = new Water(new THREE.PlaneGeometry(50000, 50000), {
            textureWidth: 512, textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', t => t.wrapS = t.wrapT = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 1).normalize(), sunColor: 0x333333, waterColor: 0x000a15, distortionScale: 4.0
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        scene.add(new THREE.DirectionalLight(0xffffff, 2.5));
        scene.add(new THREE.AmbientLight(0x222244));
        scene.fog = new THREE.Fog(0x000a15, 0, 5000);

        document.addEventListener('mousedown', () => { if(!isLocked) document.body.requestPointerLock(); else fireCannon(); });
        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none';
        });
        document.addEventListener('mousemove', (e) => { if(isLocked) ship.rotation.y -= e.movementX * 0.0015; });
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;
    }

    function fireCannon() {
        if(ammoCount <= 0) return;
        ammoCount -= 1;
        document.getElementById('ammo-val').innerText = ammoCount;

        const bMesh = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
        bMesh.position.copy(ship.position).add(new THREE.Vector3(0, 5, 10).applyQuaternion(ship.quaternion));
        const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(ship.quaternion);
        bullets.push({ mesh: bMesh, vel: dir.multiplyScalar(15), life: 300 });
        scene.add(bMesh);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isLocked) {
            if(keys['KeyW']) velocity += 0.012;
            if(keys['KeyS']) velocity -= 0.008;
            velocity *= 0.985;
            ship.translateZ(velocity);
            
            if(Math.random() > 0.99 && fuelCount > 0) {
                fuelCount -= 1;
                document.getElementById('fuel-val').innerText = fuelCount;
            }
        }

        bullets.forEach((b, i) => {
            b.mesh.position.add(b.vel);
            b.life--;
            if(b.life <= 0){ scene.remove(b.mesh); bullets.splice(i, 1); }
        });

        water.material.uniforms['time'].value += 1.0 / 60.0;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
