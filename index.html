<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naval Storm | EXTREME WEATHER</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        #lobby {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #0a1a2a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #f44; 
            min-width: 180px; pointer-events: none; display: none;
        }
        #controls-bar {
            position: absolute; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.95); border-top: 1px solid #444;
            padding: 12px; text-align: center; color: #0f0; font-size: 0.9rem; font-weight: bold;
        }
        .btn {
            padding: 15px 40px; margin: 10px; cursor: pointer; border: 2px solid #fff;
            background: transparent; color: #fff; font-size: 1.1rem; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; 
            border: 1px solid rgba(0, 255, 0, 0.5); transform: translate(-50%, -50%); 
            pointer-events: none; display: none; z-index: 100;
        }
        #crosshair::after { content: 'READY'; position: absolute; bottom: -20px; left: 5px; font-size: 8px; color: #0f0; }

        .stat-value { font-size: 1.6rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3.5rem; letter-spacing: 12px; color: #fff;">NAVAL STORM</h1>
    <p style="color: #555;">STORM & TORPEDO PROTOCOL v2.0</p>
    <div style="display: flex;">
        <button class="btn" onclick="startGame('USA', 0x1a237e)">USA</button>
        <button class="btn" onclick="startGame('USSR', 0x5e1b1b)">USSR</button>
        <button class="btn" onclick="startGame('GER', 0x333333)">GERMANY</button>
    </div>
</div>

<div id="ui">
    <div style="font-size: 0.7rem; color: #0f0;">COMMANDER STATUS: ACTIVE</div>
    <div id="n-tag" class="stat-value">-</div>
    <div style="font-size: 0.7rem; color: #888; margin-top:10px;">VELOCITY</div>
    <div><span id="spd" class="stat-value">0.0</span> KTS</div>
</div>

<div id="crosshair"></div>
<div id="controls-bar">LEFT-CLICK: CANNONS | RIGHT-CLICK: TORPEDO | WASD: MOVE | ESC: UNLOCK</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { Water } from 'three/addons/objects/Water.js';

    let scene, camera, renderer, water, ship, lightning;
    let velocity = 0, isLocked = false, myNation = null;
    let rain, rainGeo;
    const keys = {}, bullets = [], enemies = [], torpedoes = [];

    // --- INPUT ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('mousedown', (e) => {
        if (!myNation) return;
        if (!isLocked) {
            document.body.requestPointerLock();
        } else {
            if (e.button === 0) fireCannon();
            if (e.button === 2) fireTorpedo();
        }
    });

    document.addEventListener('pointerlockchange', () => {
        isLocked = document.pointerLockElement === document.body;
        document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none';
        document.getElementById('ui').style.display = isLocked ? 'block' : 'none';
    });

    document.addEventListener('mousemove', (e) => {
        if (isLocked && ship) ship.rotation.y -= e.movementX * 0.0015;
    });

    // --- START GAME ---
    window.startGame = (nation, color) => {
        myNation = nation;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('n-tag').innerText = nation;
        document.getElementById('n-tag').style.color = '#' + color.toString(16);

        // Reset Ship Geometry
        const toRemove = [];
        ship.children.forEach(child => { if(child.type === "Mesh") toRemove.push(child); });
        toRemove.forEach(child => ship.remove(child));

        let hullGeo = (nation === 'USSR') ? new THREE.BoxGeometry(6.5, 3.5, 14) : new THREE.BoxGeometry(3.5, 3, 18);
        const hull = new THREE.Mesh(hullGeo, new THREE.MeshStandardMaterial({ color: color, metalness: 0.9, roughness: 0.1 }));
        hull.position.y = 1;
        ship.add(hull);

        const bridge = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 4), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        bridge.position.set(0, 4.5, -4);
        ship.add(bridge);

        spawnFleet();
        createRain();
    };

    function createRain() {
        rainGeo = new THREE.BufferGeometry();
        const rainCount = 10000;
        const positions = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount*3; i+=3) {
            positions[i] = (Math.random()-0.5)*2000;
            positions[i+1] = Math.random()*500;
            positions[i+2] = (Math.random()-0.5)*2000;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.5, transparent: true });
        rain = new THREE.Points(rainGeo, rainMat);
        scene.add(rain);
    }

    function spawnFleet() {
        for(let i=0; i<15; i++) {
            const e = new THREE.Mesh(new THREE.BoxGeometry(7, 4, 16), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            e.position.set((Math.random()-0.5)*1200, 0, 500 + (i*150));
            scene.add(e);
            enemies.push({ mesh: e, hp: 100 });
        }
    }

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 30000);
        ship = new THREE.Group();
        scene.add(ship);
        ship.add(camera);
        camera.position.set(0, 6, 0); 

        water = new Water(new THREE.PlaneGeometry(40000, 40000), {
            textureWidth: 512, textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', t => t.wrapS = t.wrapT = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 1).normalize(), sunColor: 0x444444, waterColor: 0x00050a, distortionScale: 5.0
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        lightning = new THREE.DirectionalLight(0xffffff, 0);
        scene.add(lightning);
        scene.add(new THREE.AmbientLight(0x111122));
        scene.fog = new THREE.Fog(0x00050a, 10, 3000);

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;
    }

    function fireCannon() {
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
        b.position.copy(ship.position).add(new THREE.Vector3(0, 5, 10).applyQuaternion(ship.quaternion));
        const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(ship.quaternion);
        bullets.push({ mesh: b, vel: dir.multiplyScalar(12) });
        scene.add(b);
    }

    function fireTorpedo() {
        const t = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 4), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
        t.rotation.x = Math.PI/2;
        t.position.copy(ship.position).add(new THREE.Vector3(0, -1, 5).applyQuaternion(ship.quaternion));
        const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(ship.quaternion);
        t.quaternion.setFromRotationMatrix(new THREE.Matrix4().lookAt(t.position, t.position.clone().add(dir), new THREE.Vector3(0,1,0)));
        torpedoes.push({ mesh: t, vel: dir.multiplyScalar(4) });
        scene.add(t);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isLocked && myNation) {
            if (keys['KeyW']) velocity += 0.015;
            if (keys['KeyS']) velocity -= 0.01;
            velocity *= 0.98;
            ship.translateZ(velocity);
            
            // Camera Sway
            camera.position.y = 6 + Math.sin(Date.now()*0.002)*0.1;
            
            // Rain Logic
            if(rain) {
                const pos = rainGeo.attributes.position.array;
                for(let i=1; i<pos.length; i+=3) {
                    pos[i] -= 4; // Fall speed
                    if(pos[i] < 0) pos[i] = 500;
                }
                rainGeo.attributes.position.needsUpdate = true;
            }

            // Lightning Flash
            if(Math.random() > 0.995) {
                lightning.intensity = 5;
                setTimeout(() => lightning.intensity = 0, 100);
            }

            document.getElementById('spd').innerText = Math.abs(velocity * 100).toFixed(1);
        }

        // Projectile Logic
        [...bullets, ...torpedoes].forEach((proj, i) => {
            proj.mesh.position.add(proj.vel);
            enemies.forEach(en => {
                if (en.hp > 0 && proj.mesh.position.distanceTo(en.mesh.position) < 20) {
                    en.hp -= 50; scene.remove(proj.mesh);
                    if(en.hp <= 0) en.mesh.position.y = -30;
                }
            });
        });

        water.material.uniforms['time'].value += 1.0 / 60.0;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
