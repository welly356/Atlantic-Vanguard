<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naval Storm: Ultra Realistic</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        
        /* --- HIGH-END BOOT INTERFACE --- */
        #boot-screen { position: absolute; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; color: #fff; }
        .panel { background: rgba(20, 20, 20, 0.9); padding: 40px; border: 1px solid #333; text-align: center; border-radius: 2px; }
        h1 { font-weight: 200; letter-spacing: 15px; margin-bottom: 40px; color: #eee; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 15px; width: 280px; text-align: center; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .btn { border: 1px solid #fff; padding: 15px 40px; background: none; color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .btn:hover { background: #fff; color: #000; }

        /* --- CINEMATIC HUD --- */
        #hud { position: absolute; bottom: 40px; right: 40px; color: #fff; text-align: right; z-index: 100; pointer-events: none; display: none; }
        .stat-row { font-size: 0.7rem; letter-spacing: 3px; color: #888; margin-top: 5px; }
        #speed-val { font-size: 2rem; font-weight: 100; color: #fff; }
        #health-container { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 10px; }
        #health-bar { width: 100%; height: 100%; background: #fff; transition: 0.5s; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); display: none; opacity: 0.5; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="panel">
        <h1>NAVAL STORM</h1>
        <input type="text" id="callsign" placeholder="IDENTITY TAG" maxlength="12">
        <br>
        <button class="btn" onclick="initUltra('USA')">Initialize Session</button>
    </div>
</div>

<div id="hud">
    <div id="speed-val">00.0</div>
    <div class="stat-row">KNOTS // PROPULSION</div>
    <div id="health-container"><div id="health-bar"></div></div>
</div>

<div id="crosshair"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { Water } from 'three/addons/objects/Water.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    let scene, camera, renderer, composer, water, ship, player, turret, isLocked = false;
    let velocity = 0, health = 100, isWalking = false, pitch = 0;
    const keys = {}, bullets = [], debris = [];

    window.initUltra = (side) => {
        if (!document.getElementById('callsign').value) return;
        document.getElementById('boot-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            startEngine();
        }, 500);
    };

    function startEngine() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x050508, 0.0008);

        camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 20000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.8; 
        document.body.appendChild(renderer.domElement);

        // --- POST PROCESSING ---
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.9));
        composer.addPass(new OutputPass());

        // --- WORLD GEN ---
        const waterGeo = new THREE.PlaneGeometry(10000, 10000);
        water = new Water(waterGeo, {
            textureWidth: 1024, textureHeight: 1024,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => t.wrapS = t.wrapT = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 1).normalize(),
            sunColor: 0xffffff, waterColor: 0x000308, distortionScale: 3.0
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        // --- SHIP (REALISTIC SUPERSTRUCTURE) ---
        ship = new THREE.Group();
        const hullMat = new THREE.MeshStandardMaterial({ color: 0x1a1c1e, metalness: 0.9, roughness: 0.2 });
        const detailMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 1.0, roughness: 0.1 });

        // Flared Bow Hull
        const hull = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 22), hullMat);
        hull.position.y = 1.2;
        ship.add(hull);

        // Command Bridge
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 6), hullMat);
        bridge.position.set(0, 4.5, -2);
        const windows = new THREE.Mesh(new THREE.BoxGeometry(4.1, 0.8, 2), new THREE.MeshPhysicalMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.2, transmission: 0.9, thickness: 0.5 }));
        windows.position.set(0, 5.5, 0.5);
        bridge.add(windows);
        ship.add(bridge);

        // Turret
        turret = new THREE.Group();
        const tBase = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.5, 3), hullMat);
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 5), detailMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.3, 2.5);
        turret.add(tBase, barrel);
        turret.position.set(0, 3, 7);
        ship.add(turret);

        scene.add(ship);

        // --- PLAYER (TAC-SKIN) ---
        player = new THREE.Group();
        const armorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.3 });
        const visMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
        
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.3), armorMat);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), armorMat);
        head.position.y = 0.6;
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.05, 0.1), visMat);
        visor.position.set(0, 0.6, 0.15);
        
        player.add(torso, head, visor);
        player.position.set(0, 3, 0); 
        ship.add(player);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(100, 100, 100);
        scene.add(light, new THREE.AmbientLight(0x050510));

        // Controls
        document.addEventListener('mousedown', () => { if(!isLocked) document.body.requestPointerLock(); else fire(); });
        document.addEventListener('pointerlockchange', () => { isLocked = !!document.pointerLockElement; document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none'; });
        document.addEventListener('mousemove', (e) => { if(isLocked) { ship.rotation.y -= e.movementX * 0.0015; pitch = Math.clamp(pitch - e.movementY * 0.002, -0.5, 0.3); } });
        window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'ShiftLeft') isWalking = !isWalking; };
        window.onkeyup = (e) => keys[e.code] = false;

        animate();
    }

    function fire() {
        if(isWalking) return;
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
        b.position.copy(turret.getWorldPosition(new THREE.Vector3()));
        const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(ship.quaternion);
        bullets.push({ mesh: b, vel: dir.multiplyScalar(10) });
        scene.add(b);
        turret.position.z -= 0.5; // Recoil
    }

    function animate() {
        requestAnimationFrame(animate);
        
        if(isLocked) {
            if(!isWalking) {
                if(keys['KeyW']) velocity += 0.008;
                if(keys['KeyS']) velocity -= 0.005;
            } else {
                const ws = 0.15;
                if(keys['KeyW']) player.position.z += ws;
                if(keys['KeyS']) player.position.z -= ws;
                if(keys['KeyA']) player.position.x += ws;
                if(keys['KeyD']) player.position.x -= ws;
                player.position.x = Math.max(-2.5, Math.min(2.5, player.position.x));
                player.position.z = Math.max(-8, Math.min(8, player.position.z));
            }
        }

        velocity *= 0.99;
        ship.translateZ(velocity);
        document.getElementById('speed-val').innerText = (Math.abs(velocity)*100).toFixed(1);

        // Camera follow
        const goal = new THREE.Vector3(0, 12 + (pitch * 15), -25).applyQuaternion(ship.quaternion).add(ship.position);
        camera.position.lerp(goal, 0.1);
        camera.lookAt(ship.position);

        turret.position.z = THREE.MathUtils.lerp(turret.position.z, 7, 0.1);

        bullets.forEach((b, i) => {
            b.mesh.position.add(b.vel);
            if(b.mesh.position.distanceTo(ship.position) > 2000) { scene.remove(b.mesh); bullets.splice(i,1); }
        });

        water.material.uniforms['time'].value += 1.0 / 60.0;
        composer.render();
    }

    Math.clamp = (val, min, max) => Math.max(min, Math.min(max, val));
</script>
</body>
</html>
