<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naval Storm: Global Front</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; }
        
        /* --- CHAT UI --- */
        #chat-container {
            position: absolute; bottom: 20px; left: 20px; width: 320px; height: 180px;
            background: rgba(0,0,0,0.7); border: 1px solid #444; display: flex; flex-direction: column;
            z-index: 100; pointer-events: auto;
        }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.8rem; color: #aaa; }
        #chat-input {
            background: #111; border: none; border-top: 1px solid #444; color: #fff;
            padding: 10px; outline: none; font-family: inherit;
        }
        .chat-msg { margin-bottom: 4px; line-height: 1.2; }
        .chat-system { color: #ffff00; font-weight: bold; }

        /* --- UI ELEMENTS --- */
        #multiplayer-status {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 15px; border-right: 4px solid #0f0;
            text-align: right; min-width: 220px; border-radius: 4px;
        }
        #my-id-display { color: #0f0; font-weight: bold; cursor: pointer; background: #111; padding: 5px; margin-bottom: 8px; display: inline-block; }
        
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a2a3a 0%, #000 100%); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000; transition: 0.5s;
        }
        .btn { padding: 12px 25px; margin: 5px; cursor: pointer; border: 2px solid #fff; background: transparent; color: #fff; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #fff; color: #000; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 15px; border-left: 4px solid #f44; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(0,255,0,0.7); border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; }
        #reload-ui { font-size: 0.7rem; color: #0f0; margin-top: 5px; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3rem; margin-bottom: 0;">NAVAL STORM</h1>
    <p style="color: #f44; letter-spacing: 5px; margin-bottom: 30px;">SOVIET UPDATE v1.2</p>
    <div style="display:flex; flex-wrap: wrap; justify-content: center; max-width: 600px;">
        <button class="btn" style="border-color: #44f; color: #44f;" onclick="joinGame('USA', 0x1a237e)">USA</button>
        <button class="btn" style="border-color: #888; color: #888;" onclick="joinGame('GER', 0x333333)">GERMANY</button>
        <button class="btn" style="border-color: #4f4; color: #4f4;" onclick="joinGame('UK', 0x1b5e20)">UK</button>
        <button class="btn" style="border-color: #ff0000; color: #ff0000;" onclick="joinGame('USSR', 0x5e1b1b)">USSR (HEAVY)</button>
    </div>
</div>

<div id="multiplayer-status">
    <div style="font-size: 0.7rem; color: #888; margin-bottom: 4px;">FLEET SERVER ID</div>
    <div id="my-id-display" onclick="copyID()">GENERATING...</div>
    <div style="margin-top: 10px;">
        <input type="text" id="join-id-input" placeholder="PASTE ID" style="padding:8px; width:100px; background:#000; color:#fff; border:1px solid #444;">
        <button class="btn" style="padding:6px 12px; font-size:0.7rem; margin:0;" onclick="connectToFriend()">JOIN</button>
    </div>
</div>

<div id="chat-container">
    <div id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="PRESS ENTER TO CHAT...">
</div>

<div id="ui">
    <b>TASK FORCE: <span id="nation-tag">OFFLINE</span></b><br>
    SPEED: <span id="spd">0</span> KTS
    <div id="reload-ui">CANNONS READY</div>
</div>

<div id="crosshair"></div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { Water } from 'three/addons/objects/Water.js';

    let scene, camera, renderer, water, ship, myPeer, myNation, activeConn;
    let velocity = 0, isLocked = false, pitch = 0, canFire = true;
    let bulletVelocity = 4;
    const keys = {}, bullets = [];

    // --- IRON WALL AI MODERATION ---
    const BANNED_INTENTS = ["hack", "trash", "noob", "badword1", "ez", "spam"]; 

    function moderate(text) {
        // 1. NORMALIZATION: Strips the tricks (h.4.c.k -> hack)
        let clean = text.toLowerCase()
            .replace(/[0-9]/g, (m) => ({'0':'o', '1':'i', '3':'e', '4':'a', '5':'s', '7':'t', '8':'b'}[m] || m))
            .replace(/[^a-z\s]/gi, '') // Remove symbols
            .replace(/(.)\1{2,}/g, '$1'); // Remove repeated chars (soooo -> so)

        // 2. PRIVACY SCAN: Pattern matching for emails/phones
        const pii = /\d{3,}[-\s]?\d{3,}[-\s]?\d{4,}|[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/gi;
        let output = text.replace(pii, "[REDACTED]");

        // 3. INTENT CHECK
        let isFlagged = false;
        BANNED_INTENTS.forEach(intent => {
            if (clean.includes(intent)) isFlagged = true;
        });

        return isFlagged ? "FLAGGED_BY_AI" : output;
    }

    function addChatMessage(sender, text, isSystem = false) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = isSystem ? 'chat-msg chat-system' : 'chat-msg';
        
        div.innerHTML = isSystem ? text : `<b>[${sender}]</b>: ${text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- CHAT INPUT HANDLER ---
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            const rawMsg = e.target.value;
            let finalMsg = moderate(rawMsg);

            // If flagged, replace the entire message with asterisks
            if (finalMsg === "FLAGGED_BY_AI") {
                finalMsg = "****";
            }

            // Update local UI
            addChatMessage('YOU', finalMsg);

            // Send to peers if connected
            if (activeConn) {
                activeConn.send({ type: 'chat', text: finalMsg, from: myNation });
            }

            e.target.value = "";
            // Regain control of the ship after chatting
            document.body.requestPointerLock();
        }
    });

    window.joinGame = (nation, color) => {
        if (!ship) return;
        myNation = nation;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('nation-tag').innerText = nation;
        document.getElementById('nation-tag').style.color = '#' + color.toString(16);
        
        if(nation === 'USSR') {
            ship.children[0].geometry = new THREE.BoxGeometry(5, 2.5, 15);
            bulletVelocity = 6;
        }

        ship.children[0].material.color.setHex(color);
        ship.children[1].material.color.setHex(color);

        myPeer = new Peer();
        myPeer.on('open', (id) => { 
            document.getElementById('my-id-display').innerText = id;
            addChatMessage("SYSTEM", `Fleet connection open. ID: ${id}`, true);
        });

        myPeer.on('connection', (conn) => {
            activeConn = conn;
            setupConnListeners(conn);
        });
    };

    window.connectToFriend = () => {
        const id = document.getElementById('join-id-input').value;
        if (id && myPeer) {
            activeConn = myPeer.connect(id);
            setupConnListeners(activeConn);
        }
    };

    function setupConnListeners(conn) {
        conn.on('open', () => addChatMessage("SYSTEM", "Ally fleet connected.", true));
        conn.on('data', (data) => {
            if (data.type === 'chat') addChatMessage(data.from, data.text);
        });
    }

    window.copyID = () => {
        navigator.clipboard.writeText(document.getElementById('my-id-display').innerText);
        addChatMessage("SYSTEM", "ID copied to clipboard.", true);
    };

    function fireCannon() {
        if (!canFire || !myNation) return;
        canFire = false;
        document.getElementById('reload-ui').innerText = "RELOADING...";
        document.getElementById('reload-ui').style.color = "#f44";

        const bGeo = new THREE.SphereGeometry(0.4);
        const bMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
        const bullet = new THREE.Mesh(bGeo, bMat);

        bullet.position.copy(ship.position).y += 2.5; 
        const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(ship.quaternion);
        
        bullets.push({ mesh: bullet, vel: dir.multiplyScalar(bulletVelocity) });
        scene.add(bullet);

        setTimeout(() => {
            canFire = true;
            document.getElementById('reload-ui').innerText = "CANNONS READY";
            document.getElementById('reload-ui').style.color = "#0f0";
        }, myNation === 'USSR' ? 1000 : 600);
    }

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 20000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        water = new Water(new THREE.PlaneGeometry(10000, 10000), {
            textureWidth: 512, textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => t.wrapS = t.wrapT = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 1).normalize(), sunColor: 0xffffff, waterColor: 0x000a15, distortionScale: 4.0
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        ship = new THREE.Group();
        const hull = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 12), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        hull.position.y = 1;
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 3), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        bridge.position.set(0, 3, -1);
        ship.add(hull, bridge);
        scene.add(ship);
        ship.add(camera);
        camera.position.set(0, 12, -32);
        camera.lookAt(ship.position);

        scene.add(new THREE.AmbientLight(0x444444));
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(50, 100, 50); scene.add(sun);

        document.addEventListener('mousedown', (e) => {
            if (e.target.id === "chat-input" || e.target.id === "chat-box") return;
            if (!isLocked && myNation) document.body.requestPointerLock();
            else if (isLocked) fireCannon();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (isLocked) {
                ship.rotation.y -= e.movementX * 0.002;
                pitch = Math.max(-0.4, Math.min(0.2, pitch - e.movementY * 0.002));
                camera.position.y = 12 + (pitch * 15);
                camera.lookAt(ship.position);
            }
        });

        window.onkeydown = (e) => {
            if (document.activeElement.id === 'chat-input') return;
            keys[e.code] = true;
        };
        window.onkeyup = (e) => keys[e.code] = false;

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(isLocked && myNation) {
            if(keys['KeyW']) velocity += 0.006;
            if(keys['KeyS']) velocity -= 0.004;
            velocity *= 0.985;
            ship.translateZ(velocity);
            document.getElementById('spd').innerText = Math.abs(velocity * 100).toFixed(1);
        }
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].mesh.position.add(bullets[i].vel);
            if (bullets[i].mesh.position.distanceTo(ship.position) > 1000) {
                scene.remove(bullets[i].mesh);
                bullets.splice(i, 1);
            }
        }
        water.material.uniforms['time'].value += 1.0 / 60.0;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
