<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naval Storm: Global Front</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; }
        #multiplayer-status {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 15px; border-right: 4px solid #0f0;
            text-align: right; min-width: 220px; border-radius: 4px;
        }
        #my-id-display { color: #0f0; font-weight: bold; cursor: pointer; background: #111; padding: 5px; margin-bottom: 8px; display: inline-block; }
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a2a3a 0%, #000 100%); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000; transition: 0.5s;
        }
        .btn { padding: 12px 25px; margin: 5px; cursor: pointer; border: 2px solid #fff; background: transparent; color: #fff; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #fff; color: #000; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 15px; border-left: 4px solid #f44; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(0,255,0,0.7); border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3rem; margin-bottom: 0;">NAVAL STORM</h1>
    <p style="color: #f44; letter-spacing: 5px; margin-bottom: 30px;">SOVIET UPDATE v1.2</p>
    <div style="display:flex; flex-wrap: wrap; justify-content: center; max-width: 600px;">
        <button class="btn" style="border-color: #44f; color: #44f;" onclick="joinGame('USA', 0x1a237e)">USA</button>
        <button class="btn" style="border-color: #888; color: #888;" onclick="joinGame('GER', 0x333333)">GERMANY</button>
        <button class="btn" style="border-color: #4f4; color: #4f4;" onclick="joinGame('UK', 0x1b5e20)">UK</button>
        <button class="btn" style="border-color: #ff0000; color: #ff0000;" onclick="joinGame('USSR', 0x5e1b1b)">USSR (HEAVY)</button>
    </div>
</div>

<div id="multiplayer-status">
    <div style="font-size: 0.7rem; color: #888; margin-bottom: 4px;">FLEET SERVER ID (CLICK TO COPY)</div>
    <div id="my-id-display" onclick="copyID()">GENERATING...</div>
    <div style="margin-top: 10px;">
        <input type="text" id="join-id-input" placeholder="PASTE FRIEND ID" style="padding:8px; width:140px; background:#000; color:#fff; border:1px solid #444;">
        <button class="btn" style="padding:6px 12px; font-size:0.7rem; margin:0;" onclick="connectToFriend()">JOIN</button>
    </div>
</div>

<div id="ui">
    <b>TASK FORCE: <span id="nation-tag">OFFLINE</span></b><br>
    SPEED: <span id="spd">0</span> KTS
</div>

<div id="crosshair"></div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { Water } from 'three/addons/objects/Water.js';

    let scene, camera, renderer, water, ship, myPeer, myNation;
    let velocity = 0, isLocked = false, pitch = 0;
    const keys = {};

    // Use window assignment so the HTML buttons can see these functions
    window.joinGame = (nation, color) => {
        if (!ship) return; // Safety check
        myNation = nation;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('nation-tag').innerText = nation;
        document.getElementById('nation-tag').style.color = '#' + color.toString(16);
        
        // Massive Hull for USSR
        if(nation === 'USSR') {
            ship.children[0].geometry.dispose(); // Clean up old geo
            ship.children[0].geometry = new THREE.BoxGeometry(5, 2.5, 15);
        }

        ship.children[0].material.color.setHex(color);
        ship.children[1].material.color.setHex(color);

        myPeer = new Peer();
        myPeer.on('open', (id) => {
            document.getElementById('my-id-display').innerText = id;
        });
    };

    window.copyID = () => {
        const idText = document.getElementById('my-id-display').innerText;
        navigator.clipboard.writeText(idText);
        alert("ID Copied!");
    };

    window.connectToFriend = () => {
        const targetId = document.getElementById('join-id-input').value;
        if (targetId && myPeer) {
            myPeer.connect(targetId);
            document.getElementById('multiplayer-status').style.borderRightColor = '#44f';
        }
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 20000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // Environment
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(50, 100, 50);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x444444));

        water = new Water(new THREE.PlaneGeometry(10000, 10000), {
            textureWidth: 512, textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => t.wrapS = t.wrapT = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 1).normalize(), sunColor: 0xffffff, waterColor: 0x000a15, distortionScale: 4.0
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        // Build Ship
        ship = new THREE.Group();
        const hull = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 12), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        hull.position.y = 1;
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 3), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        bridge.position.set(0, 3, -1);
        ship.add(hull, bridge);
        scene.add(ship);

        // Attach Camera to Ship
        ship.add(camera);
        camera.position.set(0, 12, -32);
        camera.lookAt(ship.position);

        // Event Listeners
        document.addEventListener('mousedown', () => { if(myNation) document.body.requestPointerLock(); });
        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none';
        });
        document.addEventListener('mousemove', (e) => {
            if (isLocked) {
                ship.rotation.y -= e.movementX * 0.002;
                pitch = Math.max(-0.4, Math.min(0.2, pitch - e.movementY * 0.002));
                camera.position.y = 12 + (pitch * 15);
                camera.lookAt(ship.position);
            }
        });

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(isLocked && myNation) {
            if(keys['KeyW']) velocity += 0.006;
            if(keys['KeyS']) velocity -= 0.004;
            velocity *= 0.985;
            ship.translateZ(velocity);
            document.getElementById('spd').innerText = Math.abs(velocity * 100).toFixed(1);
        }
        water.material.uniforms['time'].value += 1.0 / 60.0;
        renderer.render(scene, camera);
    }

    // Start everything
    init();
</script>
</body>
</html>
