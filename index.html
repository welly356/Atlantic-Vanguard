<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naval Storm | Original Build + Chat</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        #lobby {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #0a1a2a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #f44; 
            min-width: 150px; display: none;
        }
        /* --- SIMPLE CHAT STYLE --- */
        #chat-box {
            position: absolute; bottom: 20px; left: 20px; width: 300px;
            display: none; z-index: 20;
        }
        #chat-log {
            height: 120px; overflow-y: hidden; margin-bottom: 5px;
            color: #aaa; font-size: 0.85rem; display: flex; flex-direction: column; justify-content: flex-end;
        }
        #chat-input {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #444;
            color: #0f0; padding: 5px; outline: none; font-family: inherit;
        }
        .btn {
            padding: 15px 40px; margin: 10px; cursor: pointer; border: 2px solid #fff;
            background: transparent; color: #fff; font-size: 1.1rem; font-weight: bold;
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; 
            border: 1px solid rgba(0, 255, 0, 0.5); transform: translate(-50%, -50%); 
            pointer-events: none; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="letter-spacing: 10px;">NAVAL STORM</h1>
    <button class="btn" onclick="startGame('USA', 0x2233ff)">START</button>
</div>

<div id="ui">
    <div id="nation-display" style="font-weight:bold;">-</div>
    <div style="font-size: 0.8rem; color: #888; margin-top:10px;">VELOCITY</div>
    <div><span id="spd">0.0</span> KTS</div>
</div>

<div id="chat-box">
    <div id="chat-log"><div>[SYSTEM]: Press Enter to chat.</div></div>
    <input type="text" id="chat-input" maxlength="50" placeholder="Type message...">
</div>

<div id="crosshair"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { Water } from 'three/addons/objects/Water.js';

    let scene, camera, renderer, water, ship;
    let velocity = 0, isLocked = false, isChatting = false;
    const keys = {}, bullets = [];

    // --- CHAT LOGIC ---
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (!isChatting) {
                isChatting = true;
                document.getElementById('chat-input').focus();
                document.exitPointerLock();
            } else {
                sendChat();
            }
        }
        if (!isChatting) keys[e.code] = true;
    });

    window.addEventListener('keyup', (e) => keys[e.code] = false);

    function sendChat() {
        const input = document.getElementById('chat-input');
        const log = document.getElementById('chat-log');
        if (input.value.trim() !== "") {
            const msg = document.createElement('div');
            msg.innerText = "[YOU]: " + input.value;
            log.appendChild(msg);
            if (log.childNodes.length > 6) log.removeChild(log.firstChild);
        }
        input.value = "";
        isChatting = false;
        document.body.requestPointerLock();
    }

    // --- START ---
    window.startGame = (nation, color) => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('chat-box').style.display = 'block';
        document.getElementById('nation-display').innerText = nation;
        document.getElementById('nation-display').style.color = '#' + color.toString(16);

        const hull = new THREE.Mesh(new THREE.BoxGeometry(4, 2.5, 18), new THREE.MeshStandardMaterial({ color: color }));
        hull.position.y = 1.25;
        ship.add(hull);
    };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
        ship = new THREE.Group();
        scene.add(ship);
        ship.add(camera);
        camera.position.set(0, 5, 0);

        water = new Water(new THREE.PlaneGeometry(50000, 50000), {
            textureWidth: 512, textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', t => t.wrapS = t.wrapT = THREE.RepeatWrapping),
            sunDirection: new THREE.Vector3(1, 1, 1).normalize(), sunColor: 0xffffff, waterColor: 0x001e0f, distortionScale: 3.7
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        scene.add(new THREE.AmbientLight(0x444444));
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(100, 100, 100);
        scene.add(sun);

        document.addEventListener('mousedown', () => { if (!isChatting) document.body.requestPointerLock(); });
        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none';
        });
        document.addEventListener('mousemove', (e) => { if (isLocked) ship.rotation.y -= e.movementX * 0.002; });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isLocked && !isChatting) {
            if (keys['KeyW']) velocity += 0.01;
            if (keys['KeyS']) velocity -= 0.005;
            velocity *= 0.98;
            ship.translateZ(velocity);
            document.getElementById('spd').innerText = Math.abs(velocity * 100).toFixed(1);
        }
        water.material.uniforms['time'].value += 1.0 / 60.0;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
